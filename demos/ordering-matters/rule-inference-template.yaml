system: |
  You are an expert in inverse behavior modeling.
  Infer an agent policy from observed trajectories.

template: |
  You are given trajectory rows from a 2D foraging simulation.

  Ordering label: {ordering_label}
  Ticks observed: {tick_count}
  Agent count: {agent_count}
  Initial food patches: {food_count}

  Trajectory rows:
  {trajectory_text}

  Task:
  Infer the most likely behavioral rule set that generated these trajectories.

  Return exactly these fields:
  - inferred_rule: short plain-English rule (1-2 sentences)
  - evidence: 2-4 bullet points tied to trajectory patterns
  - confidence: a number from 0 to 100

  Constraints:
  - Do not mention ordering artifacts unless needed as uncertainty.
  - Focus on motion regularities (goal-seeking, avoidance, momentum, randomness).
